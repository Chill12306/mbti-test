<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素农场 · 灵魂探索</title>
    
    <!-- 引入像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-cottage">

    <!-- CRT 扫描线效果 -->
    <div class="scanlines"></div>

    <!-- 主游戏容器 -->
    <div class="game-container">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="player-info">
                <div class="pixel-avatar"></div>
                <div>
                    <div class="player-name">HERO</div>
                    <div class="player-level">LV.1 FARMER</div>
                </div>
            </div>
            <div class="level-badge">QUEST: SOUL</div>
        </div>

        <!-- 存档按钮 -->
        <div id="save-slot-btn" class="save-slot" style="display:none;" onclick="app.loadSavedGame()">
            💾 LOAD SAVE
        </div>

        <!-- 主内容区域 -->
        <div class="content-box" id="main-screen"></div>
    </div>

    <!-- 引入 JavaScript 文件 (注意顺序：先数据后逻辑) -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
